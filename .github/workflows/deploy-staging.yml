name: Deploy Staging

on:
  push:
    branches: [staging, develop]

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Apply migrations to staging DB
        env:
          DIRECT_URL: ${{ secrets.STAGING_DIRECT_URL }}
        run: npx prisma migrate deploy
